services:
  # ─────────────────────────────────────────────
  # Omnipus Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm omnipus-agent -m "Hello"
  # ─────────────────────────────────────────────
  omnipus-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: omnipus-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.omnipus/config.json:ro
      - omnipus-workspace:/root/.omnipus/workspace
      - omnipus-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["omnipus", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Omnipus Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  omnipus-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: omnipus-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.omnipus/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - omnipus-workspace:/root/.omnipus/workspace
      # NPM cache for faster MCP server installs
      - omnipus-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  omnipus-workspace:
  omnipus-npm-cache: # Cache npm packages to speed up MCP server installations
