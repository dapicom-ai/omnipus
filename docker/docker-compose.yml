services:
  # ─────────────────────────────────────────────
  # Omnipus Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm omnipus-agent -m "Hello"
  # ─────────────────────────────────────────────
  omnipus-agent:
    image: docker.io/sipeed/omnipus:latest
    container_name: omnipus-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.omnipus
    entrypoint: ["omnipus", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Omnipus Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  omnipus-gateway:
    image: docker.io/sipeed/omnipus:latest
    container_name: omnipus-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.omnipus

  # ─────────────────────────────────────────────
  # Omnipus Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  omnipus-launcher:
    image: docker.io/sipeed/omnipus:launcher
    container_name: omnipus-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - OMNIPUS_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/root/.omnipus
