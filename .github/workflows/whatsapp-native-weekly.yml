name: Weekly WhatsApp Native

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  pull_request:
    paths:
      - 'pkg/channels/whatsapp_native/**'
      - '.github/workflows/whatsapp-native-weekly.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CGO_ENABLED: "0"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build SPA
        shell: bash
        run: |
          npm ci
          npm run build
          rm -rf pkg/gateway/spa
          cp -r dist/spa pkg/gateway/spa

      - name: Build with whatsapp_native tag
        shell: bash
        run: go build -tags goolm,stdjson,whatsapp_native ./...

      - name: Test whatsapp_native package
        shell: bash
        run: go test -tags goolm,stdjson,whatsapp_native -timeout 10m ./pkg/channels/whatsapp_native/...

      - name: Vet
        shell: bash
        run: go vet -tags goolm,stdjson,whatsapp_native ./pkg/channels/whatsapp_native/...
