name: Cross-Platform Extra (Windows)

# Informational Windows amd64 leg. Not a required check because the
# codebase has ~15+ pre-existing POSIX-specific test assumptions that
# fail on Windows (chmod-based permission injection, /bin/sh mock CLIs,
# filepath.IsAbs of /tmp, backslash vs forward-slash in error strings,
# PTY/shell pipeline tests, etc.). Full catalog in #113.
#
# When #113 closes, fold this leg back into cross-platform.yml and
# delete this file.

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/cross-platform-extra.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    env:
      CGO_ENABLED: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build SPA
        shell: bash
        run: |
          npm ci
          npm run build
          rm -rf pkg/gateway/spa
          cp -r dist/spa pkg/gateway/spa

      - name: Build
        shell: bash
        run: go build -tags goolm,stdjson ./...

      - name: Test
        shell: bash
        run: go test -tags goolm,stdjson -short -timeout 10m ./...

      - name: Smoke boot + /health
        shell: bash
        run: |
          set -euo pipefail
          go build -tags goolm,stdjson -o omnipus ./cmd/omnipus/
          OMNIPUS_HOME="$(mktemp -d)"
          export OMNIPUS_HOME
          export OMNIPUS_MASTER_KEY="0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
          ./omnipus gateway --allow-empty > omnipus.log 2>&1 &
          PID=$!
          HOSTPORT=""
          for i in $(seq 1 30); do
            if [ -z "$HOSTPORT" ]; then
              HOSTPORT=$(grep -oE 'Gateway started on [^[:space:]]+:[0-9]+' omnipus.log 2>/dev/null | sed 's/^Gateway started on //' | head -1 || true)
            fi
            if [ -n "$HOSTPORT" ] && curl -sf "http://${HOSTPORT}/health" > /dev/null 2>&1; then
              kill "$PID" || true
              exit 0
            fi
            sleep 1
          done
          cat omnipus.log >&2
          kill "$PID" || true
          exit 1
