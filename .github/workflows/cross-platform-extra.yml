name: Cross-Platform Extra

# Non-blocking macOS and Windows matrix legs.
#
# Per Plan 3 §10 risks table:
#   "Cross-platform matrix fails frequently due to OS-specific bugs →
#    Start with lenient (warn-only) for Windows/macOS/ARM64 for two
#    weeks; then promote to required once stable."
#
# macOS + Windows currently hit pre-existing test failures surfaced by the
# matrix (not introduced by Plan 3):
#   - #107: macOS TestSandboxBackend_Fallback /var/folders symlink
#   - #108: Windows TestGetConfigPath + WeCom credential-rename tests
#
# When those issues close, fold these legs back into cross-platform.yml as
# required checks and delete this file.

on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/cross-platform-extra.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: amd64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    env:
      CGO_ENABLED: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build SPA
        shell: bash
        run: |
          npm ci
          npm run build
          rm -rf pkg/gateway/spa
          cp -r dist/spa pkg/gateway/spa

      - name: Build
        shell: bash
        run: go build -tags goolm,stdjson ./...

      - name: Test
        # Expected to fail today per #107 and #108.
        shell: bash
        run: go test -tags goolm,stdjson -short -timeout 10m ./...

      - name: Smoke boot + /health
        shell: bash
        run: |
          set -euo pipefail
          go build -tags goolm,stdjson -o omnipus ./cmd/omnipus/
          OMNIPUS_HOME="$(mktemp -d)"
          export OMNIPUS_HOME
          export OMNIPUS_MASTER_KEY="0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
          ./omnipus gateway --allow-empty > omnipus.log 2>&1 &
          PID=$!
          echo "gateway pid=$PID"
          HOSTPORT=""
          for i in $(seq 1 30); do
            if [ -z "$HOSTPORT" ]; then
              HOSTPORT=$(grep -oE 'Gateway started on [^[:space:]]+:[0-9]+' omnipus.log 2>/dev/null | sed 's/^Gateway started on //' | head -1 || true)
            fi
            if [ -n "$HOSTPORT" ] && curl -sf "http://${HOSTPORT}/health" > /dev/null 2>&1; then
              echo "health ok on ${HOSTPORT} after ${i}s"
              kill "$PID" || true
              exit 0
            fi
            sleep 1
          done
          echo "gateway did not become ready within 30 s; log follows:" >&2
          cat omnipus.log >&2
          kill "$PID" || true
          exit 1
