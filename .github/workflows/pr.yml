name: PR

on:
  pull_request: { }

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    env:
      # pkg/gateway/*.go is tagged //go:build !cgo (pure-Go per CLAUDE.md hard
      # constraint #2). Without CGO_ENABLED=0 the whole gateway package is
      # excluded from the build and every caller of gateway.Run fails with
      # "undefined: gateway.Run". CI must run with CGO disabled to match the
      # release build and the project's pure-Go policy.
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go generate
        run: go generate ./...

      - name: Golangci Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --build-tags=goolm,stdjson

  vuln_check:
    name: Security Check
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=goolm,stdjson
      # See comment on the lint job above.
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      # See comment on the lint job above.
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go generate
        run: go generate ./...

      - name: Run go test
        run: go test -tags goolm,stdjson ./...
