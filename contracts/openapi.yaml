            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/skill-trust:
    get:
      operationId: getSkillTrust
      summary: Get skill trust level
      description: 'Returns the current skill trust level from sandbox.skill_trust. Default is "warn_unverified" when not set.

        '
      tags:
      - Security
      responses:
        '200':
          description: Current skill trust level.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillTrustResponse'
        '401':
