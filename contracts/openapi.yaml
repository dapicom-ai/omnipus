                  format: double
                  minimum: 0
                  description: 0 = unlimited.
                max_agent_llm_calls_per_hour:
                  type: integer
                  format: int64
                  minimum: 0
                  description: 0 = unlimited.
                max_agent_tool_calls_per_minute:
                  type: integer
                  format: int64
                  minimum: 0
                  description: 0 = unlimited.
      responses:
        '200':
          description: Updated rate limit configuration.
          content:
            application/json:
              schema:
                type: object
                required:
                - saved
                - requires_restart
                properties:
                  saved:
                    type: boolean
                    example: true
                  requires_restart:
                    type: boolean
                    example: false
                  applied:
                    type: object
                    properties:
                      daily_cost_cap_usd:
                        type: number
                        format: double
                      max_agent_llm_calls_per_hour:
                        type: integer
                        format: int64
                      max_agent_tool_calls_per_minute:
                        type: integer
                        format: int64
                  warning:
                    type: string
                    description: Present when hot-reload failed.
        '400':
          description: Invalid field types or values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/sandbox-config:
    get:
      operationId: getSandboxConfig
      summary: Get sandbox configuration
      description: 'Returns the full sandbox configuration including mode, network settings, SSRF controls, and agent defaults.

        '
      tags:
      - Security
      responses:
        '200':
          description: Current sandbox configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxConfig'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Agent loop not initialized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateSandboxConfig
      summary: Update sandbox configuration (admin only)
      description: "Partial update \u2014 any subset of mode, allow_network_outbound, allowed_paths, ssrf_enabled, ssrf_allow_internal, ssrf.allow_internal, default_profile, shell_deny_patterns. At least one field required. mode, allowed_paths, and default_profile are restart-gated (requires_restart=true). SSRF and shell_deny_patterns are hot-reloaded. Admin-only; non-admin returns 403. Protected by RequireNotBypass middleware (returns 503 when dev_mode_bypass is active).\n"
      tags:
      - Security
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                  - 'off'
                  - permissive
                  - enforce
                allow_network_outbound:
                  type: boolean
                allowed_paths:
                  type: array
                  items:
                    type: string
                ssrf_enabled:
                  type: boolean
                ssrf_allow_internal:
                  type: array
                  items:
                    type: string
                ssrf:
                  type: object
                  properties:
                    allow_internal:
                      type: array
                      items:
                        type: string
                default_profile:
                  type: string
                  enum:
                  - ''
                  - none
                  - workspace
                  - workspace+net
                  - host
                  - 'off'
                shell_deny_patterns:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated sandbox configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxConfig'
        '400':
          description: Validation error (invalid mode, profile, or path).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: dev_mode_bypass is active (RequireNotBypass guard).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/sandbox-status:
    get:
      operationId: getSandboxStatus
      summary: Get sandbox backend runtime status (SEC-01/02/03)
      description: 'Returns the active sandbox backend, kernel capabilities, enforcement flags, and bind-port-rule count. Lets operators distinguish enforce from permissive from off states.

        '
      tags:
      - Security
      responses:
        '200':
          description: Sandbox backend runtime status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxStatus'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Agent loop not initialized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit-log:
    get:
      operationId: getAuditLog
      summary: Get recent audit log entries
      description: "Returns the last 100 audit log entries in reverse-chronological order, read from ~/.omnipus/system/audit.jsonl. Always returns an array \u2014 empty array when no entries exist.\n"
      tags:
      - Audit
      responses:
        '200':
          description: Audit log entries (reverse-chronological, max 100).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEntry'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/audit-log:
    get:
      operationId: getAuditLogToggle
      summary: Get audit logging enable/disable state
      description: 'Returns whether audit logging is currently enabled. Note: this is distinct from GET /api/v1/audit-log which returns entries. This endpoint controls the audit_log config flag.

        '
      tags:
      - Audit
      responses:
        '200':
          description: Audit log enable state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogToggle'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateAuditLogToggle
      summary: Enable or disable audit logging (admin only)
      description: "Persists sandbox.audit_log to config.json. Requires restart \u2014 the response includes applied_enabled which reflects the value before this save (currently running state). Changes are audit-logged before disabling.\n"
      tags:
      - Audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - enabled
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Audit log state saved (restart required).
          content:
            application/json:
              schema:
                type: object
                required:
                - saved
                - requires_restart
                - applied_enabled
                properties:
                  saved:
                    type: boolean
                    example: true
                  requires_restart:
                    type: boolean
                    example: true
                  applied_enabled:
                    type: boolean
                    description: Value currently in effect (before this save).
                    example: true
        '400':
          description: Missing or invalid enabled field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/retention:
    get:
      operationId: getRetention
      summary: Get session retention configuration
      description: 'Returns session_days and disabled flag from storage.retention.

        '
      tags:
      - Security
      responses:
        '200':
          description: Current retention configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionConfig'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateRetention
      summary: Update session retention configuration (admin only)
      description: "Partial update \u2014 any subset of session_days and disabled. session_days must be a non-negative integer (floats and strings rejected). disabled must be a JSON boolean (string \"true\"/\"false\" rejected). Empty body is accepted as a no-op. Hot-reloaded (requires_restart: false). Admin-only (non-admin returns 403).\n"
      tags:
      - Security
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionConfig'
      responses:
        '200':
          description: Updated retention configuration.
          content:
            application/json:
              schema:
                type: object
                required:
                - saved
                - requires_restart
                - session_days
                - disabled
                properties:
                  saved:
                    type: boolean
                    example: true
                  requires_restart:
                    type: boolean
                    example: false
                  session_days:
                    type: integer
                    minimum: 0
                    example: 30
                  disabled:
                    type: boolean
                    example: false
        '400':
          description: Type mismatch (float for session_days, string for disabled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /security/retention/sweep:
    post:
      operationId: triggerRetentionSweep
      summary: Trigger on-demand retention sweep (admin only)
      description: 'Immediately purges session directories older than the configured retention window. Returns 409 if a sweep is already in progress. Returns skipped_reason="disabled" when retention is disabled. Admin-only; emits audit with resource="storage.retention.sweep".

        '
      tags:
      - Security
      responses:
        '200':
          description: Sweep result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionSweepResult'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sweep already in progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels:
    get:
      operationId: listChannels
      summary: List all channels
      description: 'Returns the full list of communication channels with their ID, name, transport, enabled state, and description. webchat is always enabled.

        '
      tags:
      - Channels
      responses:
        '200':
          description: Array of channel entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelEntry'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels/{id}:
    get:
      operationId: getChannelConfig
      summary: Get a channel's configuration
      description: 'Returns the channel''s config with credential fields redacted (replaced with "[configured]" if set).

        '
      tags:
      - Channels
      parameters:
      - name: id
        in: path
        required: true
        description: Channel ID.
        schema:
          type: string
        example: telegram
      responses:
        '200':
          description: Channel configuration (credentials redacted).
          content:
            application/json:
              schema:
                type: object
                description: 'Channel-specific configuration object. Structure varies by channel type. Credential fields contain "[configured]" when set.

                  '
                additionalProperties: true
        '404':
          description: Channel ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels/{id}/enable:
    put:
      operationId: enableChannel
      summary: Enable a channel
      description: Sets the channel's enabled flag to true in config.
      tags:
      - Channels
      parameters:
      - name: id
        in: path
        required: true
        description: Channel ID.
        schema:
          type: string
        example: telegram
      responses:
        '200':
          description: Channel enable state updated.
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - enabled
                properties:
                  id:
                    type: string
                    example: telegram
                  enabled:
                    type: boolean
                    example: true
        '404':
          description: Channel ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels/{id}/disable:
    put:
      operationId: disableChannel
      summary: Disable a channel
      description: Sets the channel's enabled flag to false in config.
      tags:
      - Channels
      parameters:
      - name: id
        in: path
        required: true
        description: Channel ID.
        schema:
          type: string
        example: telegram
      responses:
        '200':
          description: Channel disable state updated.
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - enabled
                properties:
                  id:
                    type: string
                    example: telegram
                  enabled:
                    type: boolean
                    example: false
        '404':
          description: Channel ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels/{id}/configure:
    put:
      operationId: configureChannel
      summary: Configure a channel
      description: 'Merges request body fields into the channel''s config section. Fields absent from the request body are not touched (merge, not replace). The "enabled" field is reserved and ignored if sent. Returns the updated config with credential fields redacted.

        '
      tags:
      - Channels
      parameters:
      - name: id
        in: path
        required: true
        description: Channel ID.
        schema:
          type: string
        example: telegram
      requestBody:
        required: true
        description: 'Channel-specific configuration fields to merge. Structure varies by channel type.

          '
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                token: your-telegram-bot-token
      responses:
        '200':
          description: Updated channel configuration (credentials redacted).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Channel ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /channels/{id}/test:
    post:
      operationId: testChannel
      summary: Test a channel configuration
      description: 'Verifies required credential fields are configured without starting the channel. Returns success=false with missing field list if required credentials are absent.

        '
      tags:
      - Channels
      parameters:
      - name: id
        in: path
        required: true
        description: Channel ID.
        schema:
          type: string
        example: telegram
      responses:
        '200':
          description: Test result.
          content:
            application/json:
              schema:
                type: object
                required:
                - success
                - message
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: channel "telegram" is configured
        '404':
          description: Channel ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /config/pending-restart:
    get:
      operationId: getPendingRestart
      summary: Get pending restart-gated config changes (admin only)
      description: 'Returns an array of config keys whose persisted (disk) value differs from the boot-time applied value. Only RestartGatedKeys are checked; hot-reload keys never appear here. An empty array means no restart is needed. Admin-only; non-admin returns 403.

        '
      tags:
      - Config
      responses:
        '200':
          description: Array of pending restart entries (may be empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PendingRestartEntry'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /workspace/{agent_id}/{path}:
    get:
      operationId: getWorkspaceFile
      summary: Read a file from an agent's workspace
      description: 'Serves the file at the given path within the agent''s workspace. Requires session-cookie-or-bearer authentication and ownership check. Returns 503 when the agent has no owner (ErrAgentOrphan). Path traversal beyond the agent workspace returns 403. Security headers: Referrer-Policy, Content-Security-Policy, X-Content-Type-Options. Files > 1MB are streamed; smaller files are buffered.

        '
      tags:
      - Workspace
      parameters:
      - name: agent_id
        in: path
        required: true
        description: Agent ID.
        schema:
          type: string
        example: jim
      - name: path
        in: path
        required: true
        description: 'File path relative to the agent''s workspace root.

          '
        schema:
          type: string
        example: output/report.html
      responses:
        '200':
          description: File content with appropriate Content-Type header.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid agent ID or missing file path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Path outside agent workspace or access denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Agent or file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Agent has no owner and must be reassigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /preview/{agent_id}/{token}/{path}:
    get:
      operationId: getPreview
      summary: Serve agent-generated preview content (token-auth)
      description: "Serves static files or proxies dev-server requests for the given agent and token. No bearer authentication required \u2014 the path token IS the credential (FR-023). Served on the separate preview listener (default port gateway.port + 1). Unknown or expired tokens return 404. Static files: path-traversal guard, MIME detection, buffered/streaming. Dev-server: reverse-proxied to loopback port with CSP injection.\n"
      security: []
      tags:
      - Preview
      parameters:
      - name: agent_id
        in: path
        required: true
        description: Agent ID.
        schema:
          type: string
        example: jim
      - name: token
        in: path
        required: true
        description: 'One-time preview token minted by the web_serve tool. The token is the only credential required.

          '
        schema:
          type: string
        example: abc123def456ghij
      - name: path
        in: path
        required: true
        description: File path or sub-path within the preview root.
        schema:
          type: string
        example: index.html
      responses:
        '200':
          description: Preview file content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Malformed URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Token does not match the agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Token not found or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /credentials:
    get:
      operationId: listCredentials
      summary: List credential key names
      description: 'Lists all credential key names without values. Returns an empty array when no credentials are stored.

        '
      tags:
      - Settings
      responses:
        '200':
          description: Array of credential key names.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                - OPENAI_API_KEY
                - TELEGRAM_TOKEN
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: setCredential
      summary: Add or update a credential
      description: 'Stores an encrypted credential. The key must be non-empty. Returns 201 Created on success.

        '
      tags:
      - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - key
              - value
              properties:
                key:
                  type: string
                  description: Credential key name.
                  example: OPENAI_API_KEY
                value:
                  type: string
                  description: Credential value (stored encrypted).
                  example: sk-...
      responses:
        '201':
          description: Credential stored.
          content:
            application/json:
              schema:
                type: object
                required:
                - key
                properties:
                  key:
                    type: string
                    example: OPENAI_API_KEY
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Key field is required (empty key).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Credential store locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /credentials/{key}:
    delete:
      operationId: deleteCredential
      summary: Delete a credential
      description: Removes a credential by key. Returns 404 if not found.
      tags:
      - Settings
      parameters:
      - name: key
        in: path
        required: true
        description: Credential key name.
        schema:
          type: string
        example: OPENAI_API_KEY
      responses:
        '200':
          description: Credential removed.
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - key
                properties:
                  status:
                    type: string
                    enum:
                    - removed
                    example: removed
                  key:
                    type: string
                    example: OPENAI_API_KEY
        '404':
          description: Credential key not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Credential store locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /backup:
    post:
      operationId: createBackup
      summary: Create a backup archive
      description: 'Creates a tar.gz of ~/.omnipus/ excluding logs and backups directories. The archive is written atomically to ~/.omnipus/backups/.

        '
      tags:
      - Settings
      responses:
        '200':
          description: Backup created.
          content:
            application/json:
              schema:
                type: object
                required:
                - path
                - size_bytes
                - created_at
                properties:
                  path:
                    type: string
                    description: Absolute path to the backup file.
                    example: /home/user/.omnipus/backups/backup-20260516T103000Z.tar.gz
                  size_bytes:
                    type: integer
                    format: int64
                    minimum: 0
                    description: Size of the backup file in bytes.
                    example: 1048576
                  created_at:
                    type: string
                    format: date-time
                    example: '2026-05-16T10:30:00Z'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /backups:
    get:
      operationId: listBackups
      summary: List backup archives
      description: 'Lists all .tar.gz files in ~/.omnipus/backups/ with filename, size, and creation time. Returns an empty array when no backups exist.

        '
      tags:
      - Settings
      responses:
        '200':
          description: List of backup archive entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - filename
                  - size_bytes
                  - created_at
                  properties:
                    filename:
                      type: string
                      example: backup-20260516T103000Z.tar.gz
                    size_bytes:
                      type: integer
                      format: int64
                      minimum: 0
                      example: 1048576
                    created_at:
                      type: string
                      format: date-time
                      example: '2026-05-16T10:30:00Z'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /restore:
    post:
      operationId: restoreBackup
      summary: Restore from a backup archive
      description: 'Extracts a backup tar.gz over ~/.omnipus/, skipping config.json to preserve current settings. The filename must not contain path separators or traversal sequences.

        '
      tags:
      - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - filename
              properties:
                filename:
                  type: string
                  description: Name of the backup file (without path).
                  example: backup-20260516T103000Z.tar.gz
      responses:
        '200':
          description: Backup restored.
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - filename
                properties:
                  status:
                    type: string
                    enum:
                    - restored
                    example: restored
                  filename:
                    type: string
                    example: backup-20260516T103000Z.tar.gz
        '400':
          description: Invalid filename (path traversal, missing .tar.gz).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Backup file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Filename field is required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /storage/stats:
    get:
      operationId: getStorageStats
      summary: Get storage statistics
      description: 'Returns session count and workspace size. May include partial warnings if some agent stores could not be read.

        '
      tags:
      - Settings
      responses:
        '200':
          description: Storage statistics.
          content:
            application/json:
              schema:
                type: object
                required:
                - session_count
                - workspace_size_bytes
                properties:
                  session_count:
                    type: integer
                    minimum: 0
                    example: 42
                  workspace_size_bytes:
                    type: integer
                    format: int64
                    minimum: 0
                    example: 52428800
                  warnings:
                    type: array
                    items:
                      type: string
                    description: 'Non-fatal errors encountered while collecting stats.

                      '
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /sessions/all:
    delete:
      operationId: clearAllSessions
      summary: Delete all sessions for all agents
      description: 'Removes all session directories across all agent stores. Returns the count of removed sessions and any per-agent warnings.

        '
      tags:
      - Settings
      responses:
        '200':
          description: Sessions cleared.
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - count
                properties:
                  status:
                    type: string
                    enum:
                    - cleared
                    example: cleared
                  count:
                    type: integer
                    minimum: 0
                    example: 15
                  warnings:
                    type: array
                    items:
                      type: string
                    description: "Per-agent errors (non-fatal \u2014 partial removal possible).\n"
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
security:
- BearerAuth: []
