            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateSkillTrust
      summary: Update skill trust level (admin only)
      description: 'Persists the new skill trust level to config.sandbox.skill_trust. Only the three canonical values are accepted (case-sensitive). Changes are audit-logged.

        '
      tags:
      - Security
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - level
              properties:
                level:
                  type: string
                  enum:
                  - block_unverified
                  - warn_unverified
                  - allow_all
      responses:
        '200':
          description: Updated skill trust level.
          content:
            application/json:
              schema:
                type: object
                required:
                - saved
                - requires_restart
                - applied_level
                properties:
                  saved:
                    type: boolean
                    example: true
                  requires_restart:
                    type: boolean
                    example: false
                  applied_level:
                    type: string
                    enum:
                    - block_unverified
                    - warn_unverified
                    - allow_all
                    example: block_unverified
                  warning:
                    type: string
                    description: "Present when allow_all is selected \u2014 warns that hash verification is disabled.\n"
        '400':
          description: Invalid trust level value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
