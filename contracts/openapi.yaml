  /tool-approvals/{approval_id}:
    post:
      operationId: postToolApproval
      summary: Resolve a pending tool approval (FR-011, FR-082)
      description: 'Approve, deny, or cancel a pending tool call approval. For tools with RequiresAdminAsk=true, the caller must hold the admin role (FR-015).

        '
      tags:
      - Tools
      parameters:
      - name: approval_id
        in: path
        required: true
        description: The approval ID from the WS tool_approval_request frame.
        schema:
          type: string
        example: appr_abc123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  description: Action to take on this approval.
                  enum:
                  - approve
                  - deny
                  - cancel
                  example: approve
      responses:
        '200':
          description: Action processed successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                - approval_id
                - action
                - status
                properties:
                  approval_id:
                    type: string
                    example: appr_abc123
                  action:
                    type: string
                    enum:
                    - approve
                    - deny
                    - cancel
                    example: approve
                  status:
                    type: string
                    enum:
                    - ok
                    example: ok
        '400':
          description: Malformed body or unknown action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin role required (RequiresAdminAsk tool).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Approval ID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Approval already resolved (FR-018).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
