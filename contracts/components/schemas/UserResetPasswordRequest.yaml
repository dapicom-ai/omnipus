type: object
description: >
  Body for PUT /users/{username}/password. Admin resets another user's password.
  This is NOT the self-change-password endpoint — that is POST /auth/change-password.
  After a successful reset the target user's bearer token is also invalidated,
  requiring them to log in again with the new password.
required:
  - password
properties:
  password:
    type: string
    minLength: 8
    description: New password for the target user. Minimum 8 characters.
    example: "newpassword123"
