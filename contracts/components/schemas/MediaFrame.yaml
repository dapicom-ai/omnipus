title: MediaFrame
description: >
  Server → client. One or more media attachments generated by an agent tool
  (e.g., a browser screenshot, a file produced by a shell command). Emitted
  as a companion frame after the corresponding tool_call_result. The SPA
  renders the attachments inline in the assistant message bubble.
  IMPORTANT: parts MUST be an array (never null). The SPA iterates parts.map()
  directly — null would cause a runtime crash.
type: object
required:
  - type
  - session_id
  - parts
additionalProperties: false
properties:
  type:
    type: string
    const: media
  session_id:
    type: string
    minLength: 1
    description: Session in which the media was produced.
  parts:
    type: array
    minItems: 1
    items:
      $ref: MediaPart.yaml
    description: >
      Non-empty array of media attachments. The server only emits a media frame
      when at least one part is present.
